<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stona Steve Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- STYLES --- */
        :root {
            --bg-black: #050000; 
            --main-red: #8b0000; 
            --bright-red: #ff3131; 
            --text-color: #f0f0f0;
        }

        html { background-color: var(--bg-black); height: 100%; overflow-x: hidden; }
        body {
            background: radial-gradient(circle at center, #1a0000 0%, var(--bg-black) 100%);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overscroll-behavior: none; 
        }

        * { cursor: auto; box-sizing: border-box; outline: none !important; -webkit-tap-highlight-color: transparent; }
        
        .container {
            background: rgba(10, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 49, 49, 0.15);
            padding: 30px;
            border-radius: 25px;
            width: 95%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .logo { font-size: 3rem; font-weight: 900; color: var(--bright-red); text-shadow: 0 0 15px rgba(255, 49, 49, 0.5); }
        h1 { font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        .tagline { font-size: 0.65rem; color: #666; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }

        /* MENU ENGINE */
        .menu-content { display: none; flex-direction: column; width: 100%; }
        
        /* THE CRITICAL DISPLAY OVERRIDE */
        .menu-content.show { display: flex !important; animation: slideDown 0.2s ease-out forwards; }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-block { margin-bottom: 12px; }
        .sub-block { margin-bottom: 8px; }

        /* BUTTONS */
        .main-btn {
            width: 100%; background: #0a0000; border: 1px solid rgba(255, 49, 49, 0.4);
            color: var(--bright-red); padding: 16px; font-size: 0.9rem; font-weight: 900;
            letter-spacing: 1px; border-radius: 12px; transition: 0.3s; cursor: pointer;
        }
        .main-btn:hover { background: rgba(255, 49, 49, 0.1); box-shadow: 0 0 15px rgba(255, 49, 49, 0.2); }

        .sub-btn {
            width: 100%; background: #110000; border: 1px solid #330000; color: #ccc;
            padding: 14px; font-size: 0.8rem; font-weight: bold; border-radius: 8px; transition: 0.3s; cursor: pointer;
        }
        .sub-btn:hover { background: #220000; color: #fff; border-color: var(--main-red); }

        .sub-content { padding: 10px 10px 10px 10px; }
        .action-btn {
            display: block; width: 100%; background: #1a0505; border: 1px solid var(--main-red);
            color: #fff; padding: 12px; font-size: 0.75rem; font-weight: bold; text-decoration: none;
            margin-bottom: 6px; border-radius: 6px; transition: 0.2s; text-transform: uppercase; cursor: pointer;
        }
        .action-btn:hover { background: var(--bright-red); color: #000; box-shadow: 0 0 10px rgba(255, 49, 49, 0.5); }
        
        footer { font-size: 0.6rem; color: #444; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">SSS</div>
            <h1>STONA STEVE STUDIOS</h1>
            <p class="tagline">HIGH PERFORMANCE • HIGH AESTHETICS</p>
        </header>

        <main class="menu-system">
            
            <div class="menu-block">
                <button class="main-btn toggle-btn" data-target="main-mods">1. MODS & PACKS ▼</button>
                <div id="main-mods" class="menu-content">
                    <div class="sub-block">
                        <button class="sub-btn toggle-btn" data-target="sub-v26">Version 26.1 ▼</button>
                        <div id="sub-v26" class="menu-content sub-content">
                            <a href="#" class="action-btn">🍒 Cherry-Based Mega-Utility Mod</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-block">
                <button class="main-btn toggle-btn" data-target="main-assets">2. RESOURCE ASSETS ▼</button>
                <div id="main-assets" class="menu-content">
                    <div class="sub-block">
                        <button class="sub-btn toggle-btn" data-target="sub-models">Latest Version ▼</button>
                        <div id="sub-models" class="menu-content sub-content">
                            <a href="#" class="action-btn">Stona Steve Sights (Custom Models W.I.P.)</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="menu-block">
                    <div class="sub-content">
                        <a href="https://discord.gg/WYMBv7vV6p" target="_blank" class="action-btn" style="border-color: #5865F2;">Join Discord</a>
                        <a href="https://www.tiktok.com/@stona.steve" target="_blank" class="action-btn" style="border-color: #ff0050;">Watch on TikTok</a>
                    </div>


        </main>

        <footer>
            <p>&copy; 2026 Stona Steve Studios</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log(
    "%cSTONA STEVE HUB\n" +
    "%cPOWERED BY:\n%cSTONA STEVE STUDIOS + GitHub\n" +
    "%cVERSION:\n%c26.1\n" +
    "%cSTATUS:\n%cONLINE",
    
    // Line 1: Main Header (Light Red/Glow)
    "color: #ff4d4d; font-weight: 900; font-size: 20px; text-shadow: 2px 2px #5c0000;", 
    
    // Line 2: Powered By
    "color: #8b0000; font-weight: bold;", // Dark Red
    "color: #ff4d4d;",                   // Light Red
    
    // Line 3: Version
    "color: #8b0000; font-weight: bold;", // Dark Red
    "color: #ff4d4d;",                   // Light Red
    
    // Line 4: Status
    "color: #8b0000; font-weight: bold;", // Dark Red
    "color: #ff4d4d; font-weight: 900; text-transform: uppercase;" // Light Red Bold
);

            const buttons = document.querySelectorAll('.toggle-btn');
            
            buttons.forEach(button => {
                button.addEventListener('click', () => {
                    const targetId = button.getAttribute('data-target');
                    const targetMenu = document.getElementById(targetId);
                    
                    if (targetMenu) {
                        targetMenu.classList.toggle('show');
                    }
                });
            });
        });
    </script>
</body>
</html>
