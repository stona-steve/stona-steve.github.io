<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stona Steve | Central Terminal</title>
    <style>
        /* Base Environment */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Branding */
        .brand-header {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .sys-status {
            font-size: 12px;
            color: #888888;
            margin-bottom: 10px;
        }

        /* Ghost Mode Toggle */
        .ghost-toggle {
            font-size: 14px;
            font-weight: bold;
            color: #ff3333; /* Default Red */
            cursor: pointer;
            margin-bottom: 40px;
            user-select: none;
            transition: color 0.3s;
            border: 1px solid #ff3333;
            padding: 5px 10px;
            background: rgba(255, 51, 51, 0.05);
        }

        .ghost-toggle.active {
            color: #00ff00; /* Hacker Green */
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.05);
        }

        .ghost-toggle:hover {
            box-shadow: 0 0 10px currentColor;
        }

        /* The Engine */
        .search-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 10px;
        }

        /* Input Field */
        input[type="text"] {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 15px 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #666666;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }

        /* Execute Button */
        button {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 0 30px;
            font-weight: bold;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #3a3a3a;
            border-color: #666666;
        }

        button:active {
            background-color: #111111;
        }

        /* Footer Links */
        .quick-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .quick-links a {
            color: #666666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .quick-links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="brand-header">Stona Steve Studios</div>
    <div class="sys-status" id="clock">SYSTEM ONLINE // 00:00:00</div>
    
    <div class="ghost-toggle" id="ghostBtn" onclick="toggleGhostMode()">[GHOST MODE: OFFLINE]</div>

    <form class="search-container" id="searchForm" action="https://www.google.com/search" method="get">
        <input type="text" id="searchInput" name="q" placeholder="Awaiting command..." autofocus autocomplete="off">
        <button type="submit">EXECUTE</button>
    </form>

    <div class="quick-links">
        <a href="https://github.com" target="_blank">[GITHUB]</a>
        <a href="https://youtube.com" target="_blank">[YOUTUBE]</a>
        <a href="https://discord.com/app" target="_blank">[DISCORD]</a>
    </div>

    <script>
        // JS Engine 1: Live System Clock
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('clock').innerText = `SYSTEM ONLINE // ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // JS Engine 2: Ghost Mode Logic
        let isGhostMode = false;
        
        function toggleGhostMode() {
            isGhostMode = !isGhostMode;
            const btn = document.getElementById('ghostBtn');
            const form = document.getElementById('searchForm');
            const input = document.getElementById('searchInput');

            if (isGhostMode) {
                // Activate Stealth: Swap to DuckDuckGo
                btn.classList.add('active');
                btn.innerText = "[GHOST MODE: ACTIVE]";
                form.action = "https://duckduckgo.com/";
                input.placeholder = "Encrypted routing engaged...";
            } else {
                // Deactivate Stealth: Swap back to Google
                btn.classList.remove('active');
                btn.innerText = "[GHOST MODE: OFFLINE]";
                form.action = "https://www.google.com/search";
                input.placeholder = "Awaiting command...";
            }
        }
    </script>

</body>
</html>
