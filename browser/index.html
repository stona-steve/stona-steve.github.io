<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stona Steve | Central Terminal</title>
    <style>
        /* Base Environment */
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Branding */
        .brand-header {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .sys-status {
            font-size: 12px;
            color: #888888;
            margin-bottom: 40px;
        }

        /* The Engine */
        .search-container {
            display: flex;
            width: 100%;
            max-width: 600px;
            gap: 10px;
        }

        /* Input Field */
        input[type="text"] {
            flex-grow: 1;
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 15px 20px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #666666;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }

        /* Execute Button */
        button {
            background-color: #2a2a2a;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 0 30px;
            font-weight: bold;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #3a3a3a;
            border-color: #666666;
        }

        button:active {
            background-color: #111111;
        }

        /* Footer Links */
        .quick-links {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        .quick-links a {
            color: #666666;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .quick-links a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="brand-header">Stona Steve Studios</div>
    <div class="sys-status" id="clock">SYSTEM ONLINE // 00:00:00</div>

    <form class="search-container" action="https://www.google.com/search" method="get">
        <input type="text" name="q" placeholder="Awaiting command..." autofocus autocomplete="off">
        <button type="submit">EXECUTE</button>
    </form>

    <div class="quick-links">
        <a href="stona-steve.github.io" target="_blank">[MAIN SITE]</a>
        <a href="https://discord.com/invite/WYMBv7vV6p" target="_blank">[DISCORD]</a>
    </div>

    <script>
        // JS Engine: Live System Clock
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('clock').innerText = `SYSTEM ONLINE // ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
